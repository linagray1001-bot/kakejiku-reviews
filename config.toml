baseURL = "https://example.com/"
languageCode = "en-us"
title = "Kakejiku Reviews"
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[params]
  description = "Hanging scroll of anime reviews"
  author = "Kakejiku Reviews Team"

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.8

[markup.goldmark.renderer]
  unsafe = true
